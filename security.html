<!DOCTYPE html>
<html>
<head>
  <title>SIEM Control Center</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: #020617;
      color: #00ffcc;
      overflow-x: hidden;
    }

    /* 🌌 Background Grid Animation */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background-image: linear-gradient(#00ffcc11 1px, transparent 1px),
                        linear-gradient(90deg, #00ffcc11 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveGrid 20s linear infinite;
      z-index: -1;
    }

    @keyframes moveGrid {
      from { transform: translate(0, 0); }
      to { transform: translate(-40px, -40px); }
    }

    /* ✨ Scanline Effect */
    body::after {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,255,204,0.05) 3px
      );
      pointer-events: none;
    }

    .container {
      padding: 20px;
    }

    h1 {
      text-shadow: 0 0 10px #00ffcc;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #00ffcc; }
      to { text-shadow: 0 0 20px #00ffcc; }
    }

    /* 🧠 Cards */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: rgba(0,255,204,0.05);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #00ffcc33;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h2 {
      margin: 0;
      font-size: 30px;
    }

    /* 📤 Upload */
    .upload-box {
      background: rgba(0,255,204,0.05);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid #00ffcc33;
    }

    button {
      background: #00ffcc;
      color: black;
      border: none;
      padding: 8px 15px;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      box-shadow: 0 0 10px #00ffcc;
    }

    /* 📊 Layout */
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    canvas {
      background: rgba(0,255,204,0.05);
      border-radius: 10px;
      padding: 10px;
    }

    /* 📋 Table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(0,255,204,0.05);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
    }

    th {
      background: #001f1a;
    }

    tr:hover {
      background: #002f26;
    }

    /* 🚨 Severity Animations */
    .high {
      color: red;
      animation: blink 1s infinite;
    }

    .medium {
      color: orange;
    }

    .low {
      color: #00ffcc;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    /* 💻 Terminal Header */
    .terminal {
      background: black;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #00ffcc;
      font-size: 14px;
    }
  </style>
</head>

<body>
<div class="container">

<div class="terminal">
> Initializing SIEM Engine...  
> Loading detection modules...  
> System status: <span style="color:#00ff00">ACTIVE</span>
</div>

<h1>🧠 SIEM Control Center</h1>

<!-- Cards -->
<div class="cards">
  <div class="card"><h2 id="total">0</h2><p>Total</p></div>
  <div class="card"><h2 id="high">0</h2><p>High</p></div>
  <div class="card"><h2 id="medium">0</h2><p>Medium</p></div>
  <div class="card"><h2 id="low">0</h2><p>Low</p></div>
</div>

<!-- Upload -->
<div class="upload-box">
  <input type="file" id="fileInput">
  <button onclick="upload()">Upload & Scan</button>
</div>

<div class="grid">

  <canvas id="chart"></canvas>

  <div>
    <h3>🚨 Alerts</h3>
    <table id="alertsTable">
      <tr>
        <th>ID</th>
        <th>Message</th>
        <th>Technique</th>
        <th>Severity</th>
      </tr>
    </table>
  </div>

</div>

</div>

<script>
const API = "http://127.0.0.1:8000";

let chart;

async function loadAlerts() {
  const res = await fetch(`${API}/alerts`);
  const data = await res.json();

  const table = document.getElementById("alertsTable");
  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Message</th>
      <th>Technique</th>
      <th>Severity</th>
    </tr>
  `;

  let high=0, medium=0, low=0;

  data.forEach(a => {
    const row = table.insertRow();
    row.innerHTML = `
      <td>${a.id}</td>
      <td>${a.message}</td>
      <td>${a.technique}</td>
      <td class="${a.severity}">${a.severity}</td>
    `;

    if (a.severity==="high") high++;
    else if (a.severity==="medium") medium++;
    else low++;
  });

  document.getElementById("total").innerText = data.length;
  document.getElementById("high").innerText = high;
  document.getElementById("medium").innerText = medium;
  document.getElementById("low").innerText = low;

  renderChart(high, medium, low);
}

function renderChart(high, medium, low) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['High','Medium','Low'],
      datasets: [{
        data: [high, medium, low],
        backgroundColor: ['red','orange','#00ffcc']
      }]
    }
  });
}

async function upload() {
  const file = document.getElementById("fileInput").files[0];
  const formData = new FormData();
  formData.append("file", file);

  await fetch(`${API}/upload`, {
    method: "POST",
    body: formData
  });

  alert("Scan complete");
  loadAlerts();
}

/* ⚡ Auto-refresh */
setInterval(loadAlerts, 5000);

loadAlerts();
</script>

</body>
</html>
