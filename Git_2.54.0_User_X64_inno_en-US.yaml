ReleaseNotes: 'Changes since Git for Windows v2.53.0(3) (April 14th 2026)

  Due to persistent maintenance challenges, git svn is no longer included in Git for
  Windows. Users who still need this command are highly encouraged to use a Linux
  version of git svn via the Windows Subsystem for Linux instead, or switch to a regular
  MSYS2 setup: install MSYS2, then run the following command in the MSYS2 UCRT64 Bash:
  pacman -Sy mingw-w64-ucrt-x86_64-git-svn. After that, the git svn command will be
  available in that Bash. On Windows/ARM64, you will want to use the CLANGARM64 variant
  instead (and install mingw-w64-clang-aarch64-git-svn).

  New Features

  - Comes with Git v2.54.0.

  - Comes with Bash v5.3.9.

  - Comes with Git Credential Manager v2.7.3.

  - Comes with MinTTY v3.8.2.

  - The shell aliases in Git Bash that ensured that interpreters such as Python and
  Node.JS are executed via winpty are no longer necessary, and have therefore been
  dropped.

  - Comes with the MSYS2 runtime (Git for Windows flavor) based on Cygwin v3.6.7.

  - Comes with cURL v8.19.0.

  - Comes with OpenSSH v10.3.P1.

  - Comes with OpenSSL v3.5.6.

  Bug Fixes

  - The iconv executable, which was inadvertently dropped from Git for Windows v2.53.0''s
  installer, is now included again.

  - In some circumstances, when typing while a still-running program is about to terminate,
  the typed characters could arrive out of order in Git Bash. This bug was fixed.

  - Similar to how git clean already avoids traversing NTFS junctions, git worktree
  remove now does the same.

  - The number of CPU cores is now detected correctly on multi-socket systems.

  - When fetching/pushing via Secure Channel (the default TLS/SSL method), the timeout
  to renegotiate (e.g. using client certificates) was recently reduced to 7 seconds,
  which was too short. It has been extended to 60 seconds.

  - The recent security bug fix that disables NTLM by default missed the NTLM fallback
  in the Kerberos protocol. This fallback is now disabled, following the cURL project''s
  guidance.

  - A really old bug which prevented Kerberos authentication from working with the
  default http.emptyAuth ("auto"), was fixed.

  - The git instaweb command is no longer distributed with Git for Windows because
  it would require GitWeb (which has not been distributed with Git for Windows for
  quite a few years).'
